name: ML Training Pipeline

on:
  push:
    branches: [main]
    paths:
      - 'src/**.py'
      - 'data/processed/**.csv'
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  ml-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install scipy numpy pandas scikit-learn xgboost mlflow

      - name: Validate data
        run: python src/validate_data.py

      - name: Train baseline model
        env:
          MLFLOW_TRACKING_URI: sqlite:///mlflow.db
        run: python src/train.py

      - name: Report metrics
        env:
          MLFLOW_TRACKING_URI: sqlite:///mlflow.db
        run: |
          python - <<'EOF'
          import mlflow
          mlflow.set_tracking_uri("sqlite:///mlflow.db")
          runs = mlflow.search_runs(experiment_names=["battery-soh-baseline"])
          latest = runs.iloc[0]
          print(f"RMSE : {latest['metrics.rmse']:.4f}%")
          print(f"MAE  : {latest['metrics.mae']:.4f}%")
          print(f"R²   : {latest['metrics.r2']:.4f}")
          EOF